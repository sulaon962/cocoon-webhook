apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: cocoon-webhook-mutate
  annotations:
    cert-manager.io/inject-ca-from: cocoon-system/cocoon-webhook-tls
webhooks:
  - name: pods.mutate.cocoonstack.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    timeoutSeconds: 5
    objectSelector:
      matchExpressions:
        - key: cocoonset.cocoonstack.io/managed
          operator: NotIn
          values: ["false"]
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    clientConfig:
      service:
        namespace: cocoon-system
        name: cocoon-webhook
        path: /mutate
        port: 443
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: cocoon-webhook-validate
  annotations:
    cert-manager.io/inject-ca-from: cocoon-system/cocoon-webhook-tls
webhooks:
  - name: workloads.validate.cocoonstack.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 5
    rules:
      # `deployments` / `statefulsets` covers `kubectl edit`, `kubectl patch`,
      # and direct PUT/PATCH on the parent. `kubectl scale --replicas=N`
      # writes to the `/scale` subresource and bypasses the parent rule, so
      # `deployments/scale` and `statefulsets/scale` must be listed
      # explicitly to catch that path.
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["UPDATE"]
        resources:
          - deployments
          - statefulsets
          - deployments/scale
          - statefulsets/scale
        scope: Namespaced
    clientConfig:
      service:
        namespace: cocoon-system
        name: cocoon-webhook
        path: /validate
        port: 443
  - name: cocoonsets.validate.cocoonstack.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 5
    rules:
      - apiGroups: ["cocoonset.cocoonstack.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["cocoonsets"]
        scope: Namespaced
    clientConfig:
      service:
        namespace: cocoon-system
        name: cocoon-webhook
        path: /validate-cocoonset
        port: 443
